{% extends "base.html" %}
{% block title %}상품 등록{% endblock %}
{% block content %}
<h2>상품 등록</h2>
<form method="post">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
    <label>상품명</label><input name="title" maxlength="100" required>
    <label>설명</label><textarea name="description" maxlength="1000" required></textarea>
    <label>가격</label><input type="number" name="price" min="1" max="1000000000" required>
    <label>이미지 URL(선택)</label><input type="url" name="image_url" placeholder="https://...">
    <button class="ok" type="submit">등록</button>
</form>
{% endblock %}
