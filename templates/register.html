{% extends "base.html" %}
{% block title %}회원가입{% endblock %}
{% block content %}
<h2>회원가입</h2>
<form method="post">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
    <label>아이디</label>
    <input name="username" required minlength="3" maxlength="30" placeholder="영문, 숫자, 밑줄">
    <label>비밀번호</label>
    <input type="password" name="password" required minlength="8" maxlength="128" placeholder="영문과 숫자 포함 8자 이상">
    <button class="ok" type="submit">가입</button>
</form>
{% endblock %}
