{% extends "base.html" %}
{% block title %}프로필{% endblock %}
{% block content %}
<h2>프로필</h2>
<p>아이디: {{ user.username }}</p>
<form method="post">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
    <input type="hidden" name="action" value="bio">
    <label>소개글</label>
    <textarea name="bio" maxlength="300">{{ user.bio or '' }}</textarea>
    <button class="ok" type="submit">소개글 수정</button>
</form>
<hr>
<h3>비밀번호 변경</h3>
<form method="post">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
    <input type="hidden" name="action" value="password">
    <label>현재 비밀번호</label>
    <input type="password" name="current_password" required>
    <label>새 비밀번호</label>
    <input type="password" name="new_password" minlength="8" required>
    <button class="ok" type="submit">비밀번호 변경</button>
</form>
{% endblock %}
