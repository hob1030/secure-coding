<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Tiny Market{% endblock %}</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #f4f6f8; color: #222; }
        nav { background: #fff; border-bottom: 1px solid #ddd; padding: 14px 22px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
        nav a { text-decoration: none; color: #222; }
        nav form { display: inline; margin: 0; }
        main { max-width: 980px; margin: 36px auto; background: #fff; padding: 28px; border-radius: 10px; }
        input, textarea, select, button { width: 100%; box-sizing: border-box; padding: 10px; margin: 6px 0 14px; }
        button { cursor: pointer; }
        .inline { display: inline-block; width: auto; }
        .flash { padding: 12px; background: #fff3cd; border: 1px solid #ffe69c; margin-bottom: 14px; }
        .card { border: 1px solid #ddd; padding: 14px; margin: 12px 0; border-radius: 8px; }
        .danger { background: #b42318; color: #fff; border: 0; }
        .ok { background: #2563eb; color: #fff; border: 0; }
        table { width: 100%; border-collapse: collapse; margin: 14px 0 28px; }
        th, td { border: 1px solid #ddd; padding: 8px; vertical-align: top; }
        img.product { max-width: 320px; max-height: 240px; object-fit: contain; }
    </style>
</head>
<body>
<nav>
    <a href="{{ url_for('index') }}">홈</a>
    {% if current_user %}
        <a href="{{ url_for('dashboard') }}">대시보드</a>
        <a href="{{ url_for('profile') }}">프로필</a>
        <a href="{{ url_for('transfer') }}">송금</a>
        <a href="{{ url_for('messages') }}">1대1 메시지</a>
        <a href="{{ url_for('report') }}">신고</a>
        {% if current_user.is_admin %}
            <a href="{{ url_for('admin') }}">관리자</a>
        {% endif %}
        <form method="post" action="{{ url_for('logout') }}">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
            <button class="inline" type="submit">로그아웃</button>
        </form>
    {% else %}
        <a href="{{ url_for('login') }}">로그인</a>
        <a href="{{ url_for('register') }}">회원가입</a>
    {% endif %}
</nav>
<main>
    {% with messages = get_flashed_messages() %}
        {% for message in messages %}<div class="flash">{{ message }}</div>{% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
</main>
</body>
</html>
